<title id="title">南島大環線節點圖</title>
<desc id="desc">從 Christchurch 經 Arthur's Pass、West Coast、Haast、Lake Hawea、Queenstown、Te Anau、Dunedin、Oamaru、Mackenzie、Timaru 回 Christchurch 的南島行車環線。</desc>
